# Build by running `snapcraft pack`.

# WARNING:
# Snapcraft uses caching for already build steps but it's buggy and can cause strange problems.
# Clean the cache by running `snapcraft clean`.

name: video-downloader
license: GPL-3.0+
grade: stable
adopt-info: video-downloader

base: core24
confinement: strict

platforms:
  amd64:
  arm64:

environment:
  # WORKAROUND: Add python modules in Snap to search path
  PYTHONPATH: ${SNAP}/lib/python3.12/site-packages:${SNAP}/usr/lib/python3/dist-packages

apps:
  video-downloader:
    command: usr/bin/video-downloader
    extensions:
      # HINT: Adds plugs and changes environment variables when building and running
      - gnome
    plugs:
      - home
      - network
    common-id: com.github.unrud.VideoDownloader
    desktop: usr/share/applications/com.github.unrud.VideoDownloader.desktop

slots:
  video-downloader:
    interface: dbus
    bus: session
    name: com.github.unrud.VideoDownloader

parts:
  deno:
    plugin: dump
    source:
      - on amd64: https://github.com/denoland/deno/releases/download/v2.9.1/deno-x86_64-unknown-linux-gnu.zip
      - on arm64: https://github.com/denoland/deno/releases/download/v2.9.1/deno-aarch64-unknown-linux-gnu.zip
    source-type: zip
    override-build: |
      install -Dt "${CRAFT_PART_INSTALL}/usr/bin" deno

  yt-dlp:
    after: [deno]
    plugin: python
    source: .
    source-type: git
    python-packages:
      - pyxattr==0.8.1
      - yt-dlp[default]==2026.7.4
    stage-snaps:
      - ffmpeg-2404/latest/stable
    override-pull: |
      # nop
    stage:
      # WORKAROUND: Skip venv from python plugin
      - -bin/activate
      - -bin/activate.csh
      - -bin/activate.fish
      - -bin/Activate.ps1
      - -bin/python
      - -bin/python3
      - -bin/python3.12
      - -bin/pip
      - -bin/pip3
      - -bin/pip3.12
      - -pyvenv.cfg

  video-downloader:
    after: [yt-dlp]
    plugin: meson
    source: .
    source-type: git
    # WORKAROUND: Fake installation location to find dependencies at runtime
    meson-parameters: [--prefix=/snap/video-downloader/current/usr]
    build-packages:
      - gettext
      - appstream
      - librsvg2-bin
    stage-packages:
      - xdg-user-dirs
    override-build: |
      craftctl default
      # WORKAROUND: Use python from search path, the path detected by meson doesn't exist when running the Snap
      sed -e '1c#!/usr/bin/env python3' -i "${CRAFT_PART_INSTALL}/snap/video-downloader/current/usr/bin/video-downloader"
    organize:
      # WORKAROUND: Move files from fake installation location to actual target
      snap/video-downloader/current/usr: usr
    parse-info: [usr/share/metainfo/com.github.unrud.VideoDownloader.metainfo.xml]
